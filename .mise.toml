# Chronicle development tool versions
# Install mise: https://mise.jdx.dev/getting-started.html
# Then run: mise install

[tools]
go = "1.24.4"
node = "22"
"go:github.com/golangci/golangci-lint/cmd/golangci-lint" = "latest"
"go:github.com/goreleaser/goreleaser/v2" = "latest"
"go:golang.org/x/perf/cmd/benchstat" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"

[env]
# Recommended: enable race detector during development
# GOFLAGS = "-race"

[tasks.check]
run = "make check"
description = "Quick pre-commit validation (~15s)"

[tasks.test]
run = "make test-short"
description = "Run all short tests"

[tasks.bench]
run = "make benchmark"
description = "Run and save benchmarks"

[tasks.lint]
run = "golangci-lint run"
description = "Run linters"
