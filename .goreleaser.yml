version: 2
project_name: chronicle

before:
  hooks:
    - go mod tidy

builds:
  - skip: true  # Library-only, no binaries

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
  groups:
    - title: Features
      regexp: "^.*feat.*"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*"
      order: 1
    - title: Performance
      regexp: "^.*perf.*"
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: chronicle-db
    name: chronicle
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Chronicle {{ .Tag }}
    
    Install: `go get github.com/chronicle-db/chronicle@{{ .Tag }}`
    
    ### Verification
    ```bash
    # Verify checksum
    sha256sum -c checksums.txt
    ```
  extra_files:
    - glob: sbom.spdx.json
