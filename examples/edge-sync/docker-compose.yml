services:
  edge-1:
    build:
      context: ../..
      dockerfile: examples/edge-sync/Dockerfile
    environment:
      - NODE_NAME=edge-1
      - NODE_ROLE=edge
      - HTTP_PORT=8086
      - DB_PATH=/data/chronicle.db
    ports:
      - "8086:8086"
    volumes:
      - edge1-data:/data

  edge-2:
    build:
      context: ../..
      dockerfile: examples/edge-sync/Dockerfile
    environment:
      - NODE_NAME=edge-2
      - NODE_ROLE=edge
      - HTTP_PORT=8087
      - DB_PATH=/data/chronicle.db
    ports:
      - "8087:8087"
    volumes:
      - edge2-data:/data

  edge-3:
    build:
      context: ../..
      dockerfile: examples/edge-sync/Dockerfile
    environment:
      - NODE_NAME=edge-3
      - NODE_ROLE=edge
      - HTTP_PORT=8088
      - DB_PATH=/data/chronicle.db
    ports:
      - "8088:8088"
    volumes:
      - edge3-data:/data

  cloud:
    build:
      context: ../..
      dockerfile: examples/edge-sync/Dockerfile
    environment:
      - NODE_NAME=cloud-aggregator
      - NODE_ROLE=cloud
      - HTTP_PORT=8089
      - DB_PATH=/data/chronicle.db
    ports:
      - "8089:8089"
    volumes:
      - cloud-data:/data

volumes:
  edge1-data:
  edge2-data:
  edge3-data:
  cloud-data:
