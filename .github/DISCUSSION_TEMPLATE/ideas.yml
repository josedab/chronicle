title: "Idea: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Chronicle? We'd love to hear it!
        Check [Feature Maturity](https://github.com/chronicle-db/chronicle/blob/main/FEATURE_MATURITY.md) to see what's already planned.
  - type: textarea
    id: idea
    attributes:
      label: Describe your idea
      description: What would you like Chronicle to do? Why is it useful?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches have you considered?
