title: "Question: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for using Chronicle! Before asking, please check:
        - [FAQ](https://github.com/chronicle-db/chronicle/blob/main/docs/FAQ.md)
        - [Getting Started](https://github.com/chronicle-db/chronicle/blob/main/docs/GETTING_STARTED.md)
        - [Stable API Reference](https://github.com/chronicle-db/chronicle/blob/main/STABLE_API.md)
  - type: textarea
    id: question
    attributes:
      label: What's your question?
      description: Be as specific as possible. Include code examples if relevant.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? What have you tried?
