name: Performance Regression

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    outputs:
      has_baseline: ${{ steps.check_baseline.outputs.has_baseline }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run benchmarks
        run: |
          go test -bench='BenchmarkE2E_' -benchmem -count=5 -short -timeout=10m . > pr-bench.txt 2>/dev/null || true

      - name: Upload PR benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: pr-bench-results
          path: pr-bench.txt
          retention-days: 30

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Run baseline benchmarks (main)
        run: |
          cd main-branch
          go test -bench='BenchmarkE2E_' -benchmem -count=5 -short -timeout=10m . > ../baseline-bench.txt 2>/dev/null || true

      - name: Upload baseline benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: baseline-bench-results
          path: baseline-bench.txt
          retention-days: 30

      - name: Check baseline exists
        id: check_baseline
        run: |
          if [ -s baseline-bench.txt ]; then
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
          fi

  compare:
    name: Compare Results
    runs-on: ubuntu-latest
    needs: benchmark
    if: needs.benchmark.outputs.has_baseline == 'true'
    outputs:
      regression: ${{ steps.analysis.outputs.regression }}
      regression_count: ${{ steps.analysis.outputs.regression_count }}
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Download PR benchmark results
        uses: actions/download-artifact@v4
        with:
          name: pr-bench-results

      - name: Download baseline benchmark results
        uses: actions/download-artifact@v4
        with:
          name: baseline-bench-results

      - name: Statistical analysis
        id: analysis
        run: |
          echo "## ⚡ Performance Regression Analysis" > report.md
          echo "" >> report.md
          echo "### benchstat comparison" >> report.md
          echo '```' >> report.md
          benchstat baseline-bench.txt pr-bench.txt >> report.md 2>&1 || true
          echo '```' >> report.md
          echo "" >> report.md

          # Detect regressions exceeding 10% threshold
          REGRESSIONS=$(benchstat baseline-bench.txt pr-bench.txt 2>/dev/null | grep -c '+[1-9][0-9]\.' || true)

          if [ "$REGRESSIONS" -gt "0" ]; then
            echo "### ⚠️ Regressions detected" >> report.md
            echo "" >> report.md
            echo "**$REGRESSIONS benchmark(s) show >10% regression.** Please investigate before merging." >> report.md
            echo "regression=true" >> "$GITHUB_OUTPUT"
            echo "regression_count=$REGRESSIONS" >> "$GITHUB_OUTPUT"
          else
            echo "### ✅ No significant regressions" >> report.md
            echo "" >> report.md
            echo "All benchmarks are within acceptable thresholds." >> report.md
            echo "regression=false" >> "$GITHUB_OUTPUT"
            echo "regression_count=0" >> "$GITHUB_OUTPUT"
          fi

          # Show benchstat output in job summary
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload comparison report
        uses: actions/upload-artifact@v4
        with:
          name: perf-regression-report
          path: report.md
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const body = `<!-- perf-regression-bot -->\n${report}`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- perf-regression-bot -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  gate:
    name: Regression Gate
    runs-on: ubuntu-latest
    needs: compare
    if: always()
    steps:
      - name: Check regression status
        run: |
          REGRESSION="${{ needs.compare.outputs.regression }}"
          COUNT="${{ needs.compare.outputs.regression_count }}"

          if [ "$REGRESSION" = "true" ]; then
            echo "::warning::$COUNT benchmark(s) show significant performance regression (>10%)."
            echo "## ⚠️ Performance Regression Detected" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$COUNT benchmark(s) exceeded the 10% regression threshold." >> "$GITHUB_STEP_SUMMARY"
            echo "Please review the benchmark comparison results before merging." >> "$GITHUB_STEP_SUMMARY"
            # Fail the gate — uncomment the next line to hard-block PRs:
            # exit 1
          else
            echo "## ✅ Performance Gate Passed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No significant performance regressions detected." >> "$GITHUB_STEP_SUMMARY"
          fi
