name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to Chronicle! Thanks for opening your first issue.

            **Helpful links:**
            - [Getting Started](https://github.com/chronicle-db/chronicle/blob/main/docs/GETTING_STARTED.md)
            - [FAQ](https://github.com/chronicle-db/chronicle/blob/main/docs/FAQ.md)
            - [Contributing Guide](https://github.com/chronicle-db/chronicle/blob/main/CONTRIBUTING.md)
            - [Bounty Program](https://github.com/chronicle-db/chronicle/blob/main/docs/BOUNTY_PROGRAM.md) (paid contributions!)

            A maintainer will respond within 48 hours. In the meantime, please check if your question is answered in the FAQ.

          pr-message: |
            🎉 Welcome to Chronicle! Thanks for your first pull request.

            **Before review:**
            - [ ] Tests pass: `make check`
            - [ ] Code follows [conventions](https://github.com/chronicle-db/chronicle/blob/main/CONTRIBUTING.md)
            - [ ] If adding a feature, it's wired into the 4 framework files

            **Helpful links:**
            - [Contributor Onboarding](https://github.com/chronicle-db/chronicle/blob/main/docs/CONTRIBUTOR_ONBOARDING.md)
            - [Architecture Guide](https://github.com/chronicle-db/chronicle/blob/main/docs/ARCHITECTURE.md)

            A maintainer will review within 48 hours. Thank you for contributing! 🙏

  label-first-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Check if first-time contributor
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.pull_request.user.login;
            const { data: prs } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} type:pr author:${creator}`,
            });
            core.setOutput('is_first', prs.total_count <= 1 ? 'true' : 'false');

      - name: Add first-contribution label
        if: steps.check.outputs.is_first == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['first-contribution'],
            });
