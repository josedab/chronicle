name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          echo "## 🔒 Vulnerability Check" >> "$GITHUB_STEP_SUMMARY"
          if govulncheck ./... 2>&1 | tee vuln-report.txt; then
            echo "✅ No known vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Vulnerabilities detected. See report below." >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat vuln-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  staticcheck:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: |
          echo "## 🔍 Static Analysis" >> "$GITHUB_STEP_SUMMARY"
          if staticcheck ./... 2>&1 | tee static-report.txt; then
            echo "✅ No issues found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Issues detected:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            head -50 static-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
        continue-on-error: true  # Don't block on existing issues

  govet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: Run go vet
        run: |
          echo "## 🔧 Go Vet" >> "$GITHUB_STEP_SUMMARY"
          if go vet ./... 2>&1 | tee vet-report.txt; then
            echo "✅ No issues found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Issues detected:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat vet-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [govulncheck, staticcheck, govet]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🛡️ Security Audit Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| govulncheck | ${{ needs.govulncheck.result == 'success' && '✅ Pass' || '⚠️ Issues' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| staticcheck | ${{ needs.staticcheck.result == 'success' && '✅ Pass' || '⚠️ Issues' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| go vet | ${{ needs.govet.result == 'success' && '✅ Pass' || '⚠️ Issues' }} |" >> "$GITHUB_STEP_SUMMARY"
