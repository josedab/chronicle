<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f9b8e"/>
      <stop offset="100%" style="stop-color:#0b7a6e"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f9b8e;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#0f9b8e"/>
      <stop offset="100%" style="stop-color:#0f9b8e;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#0f9b8e" stroke-width="4"/>
  <!-- Grid lines -->
  <line x1="80" y1="200" x2="432" y2="200" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="80" y1="312" x2="432" y2="312" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Time-series line 1 (teal) -->
  <polyline
    points="90,300 130,280 170,260 210,230 250,245 290,200 330,180 370,195 410,170"
    fill="none"
    stroke="url(#line1)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Time-series line 2 (coral) -->
  <polyline
    points="90,340 130,320 170,310 210,290 250,305 290,270 330,260 370,275 410,250"
    fill="none"
    stroke="url(#line2)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Data points on line 1 -->
  <circle cx="210" cy="230" r="5" fill="#0f9b8e"/>
  <circle cx="290" cy="200" r="5" fill="#0f9b8e"/>
  <circle cx="410" cy="170" r="5" fill="#0f9b8e"/>
  <!-- Column bars (storage metaphor) -->
  <rect x="120" y="355" width="24" height="40" rx="3" fill="url(#accent)" opacity="0.7"/>
  <rect x="160" y="345" width="24" height="50" rx="3" fill="url(#accent)" opacity="0.8"/>
  <rect x="200" y="335" width="24" height="60" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="240" y="340" width="24" height="55" rx="3" fill="url(#accent)" opacity="0.85"/>
  <rect x="280" y="325" width="24" height="70" rx="3" fill="url(#accent)" opacity="0.95"/>
  <rect x="320" y="330" width="24" height="65" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="360" y="338" width="24" height="57" rx="3" fill="url(#accent)" opacity="0.8"/>
  <!-- Chronicle text -->
  <text x="256" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="4">CHRONICLE</text>
  <!-- Tagline -->
  <text x="256" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0f9b8e" letter-spacing="2">TIME-SERIES DATABASE</text>
</svg>
